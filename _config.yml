# Site settings
title: "n0irx Blog"
description: "[root@n0irx-blog ~]# ./share-knowledge.sh"
baseurl: ""
url: "https://9insomnie.github.io"
author: "9Insomnie"
email: "your-email@example.com"

# Hacker Theme Settings
hacker_theme:
  enable_matrix_rain: true
  enable_mouse_trail: true
  enable_glitch_effects: true
  enable_terminal_effects: true
  color_scheme: "cyberpunk" # cyberpunk, matrix, neon
  font_family: "monospace"
  show_system_status: true
  show_hacker_header: true

# Build settings
markdown: kramdown
highlighter: rouge
theme: minima
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Pagination
paginate: 5
paginate_path: "/page:num/"

# Collections
collections:
  posts:
    output: true
    permalink: /:categories/:year/:month/:day/:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "9Insomnie"
  - scope:
      path: ""
    values:
      layout: "default"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md