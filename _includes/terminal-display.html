<script>
// 终端打字机效果
function initTerminalTyping() {
    const commandElement = document.querySelector('.typing-command');
    const cursorElement = document.querySelector('.cursor');
    const outputElement = document.getElementById('terminalOutput');
    
    if (!commandElement || !cursorElement || !outputElement) return;
    
    const fullCommand = commandElement.getAttribute('data-text') || './start-blog.sh';
    const outputs = [
        { text: '[INFO] Initializing blog system...', type: 'info' },
        { text: '[OK] Blog engine started successfully', type: 'success' },
        { text: '[INFO] Loading latest posts...', type: 'info' }
    ];
    
    let commandIndex = 0;
    let outputIndex = 0;
    let isTypingCommand = true;
    
    function typeCommand() {
        if (commandIndex < fullCommand.length) {
            commandElement.textContent += fullCommand.charAt(commandIndex);
            commandIndex++;
            setTimeout(typeCommand, 100);
        } else {
            // 命令输入完成，开始显示输出
            setTimeout(() => {
                cursorElement.style.animation = 'none';
                cursorElement.style.opacity = '0';
                typeOutputs();
            }, 500);
        }
    }
    
    function typeOutputs() {
        if (outputIndex < outputs.length) {
            const output = outputs[outputIndex];
            const line = document.createElement('div');
            line.className = `output-line ${output.type}`;
            line.textContent = output.text;
            
            // 逐字显示输出
            const text = output.text;
            let charIndex = 0;
            
            function typeOutputChar() {
                if (charIndex < text.length) {
                    line.textContent = text.substring(0, charIndex + 1);
                    charIndex++;
                    setTimeout(typeOutputChar, 30);
                } else {
                    // 输出完成，准备下一行
                    outputIndex++;
                    setTimeout(typeOutputs, 800);
                }
            }
            
            outputElement.appendChild(line);
            typeOutputChar();
        } else {
            // 所有输出完成，显示最终提示符
            setTimeout(() => {
                showFinalPrompt();
            }, 1000);
        }
    }
    
    function showFinalPrompt() {
        const finalLine = document.createElement('div');
        finalLine.className = 'terminal-line';
        finalLine.innerHTML = `
            <span class="prompt">root@hacker-blog</span>
            <span class="separator">:</span>
            <span class="path">~/blog</span>
            <span class="prompt-symbol">$</span>
            <span class="cursor">|</span>
        `;
        outputElement.parentElement.appendChild(finalLine);
    }
    
    // 开始打字机效果
    typeCommand();
}

// 初始化终端效果
document.addEventListener('DOMContentLoaded', function() {
    // 延迟启动，让页面先加载完成
    setTimeout(initTerminalTyping, 1000);
});
</script>
