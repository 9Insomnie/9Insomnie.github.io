<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
    
    <!-- CSS -->
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/hacker-style.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/code-highlight.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/mobile-optimization.css' | relative_url }}">
    
    <!-- SEO and Feed -->
    {% seo %}
    {% feed_meta %}
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="{{ '/assets/images/favicon.ico' | relative_url }}">
    
    <!-- Hacker Theme Meta -->
    <meta name="theme-color" content="#00ff41">
    <meta name="apple-mobile-web-app-status-bar-style" content="#00ff41">
    
    <!-- Mobile Optimization Meta -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-touch-fullscreen" content="yes">
</head>
<body>
    {% include hacker-header.html %}
    <header class="site-header">
        <nav class="navbar">
            <div class="nav-container">
                <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
                <ul class="nav-menu">
                    <li><a href="{{ '/' | relative_url }}">首页</a></li>
                    <li><a href="{{ '/about' | relative_url }}">关于</a></li>
                    <li><a href="{{ '/archive' | relative_url }}">归档</a></li>
                    <li><a href="{{ '/tags' | relative_url }}">标签</a></li>
                </ul>
                <div class="nav-toggle">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </nav>
    </header>

    <main class="main-content">
        {{ content }}
    </main>

    <footer class="site-footer">
        <div class="footer-content">
            <p>&copy; {{ site.time | date: "%Y" }} {{ site.author }}. All rights reserved.</p>
            <p>Powered by <a href="https://jekyllrb.com/" target="_blank">Jekyll</a> and <a href="https://pages.github.com/" target="_blank">GitHub Pages</a></p>
        </div>
    </footer>

    <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/hacker-effects.js' | relative_url }}"></script>
</body>
</html>
